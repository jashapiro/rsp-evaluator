[workspace]
authors = ["Joshua Shapiro <josh.shapiro@ccdatalab.org>"]
channels = ["conda-forge", "bioconda"]
name = "rsp-evaluator"
platforms = ["osx-arm64", "win-64", "linux-64"]
version = "0.1.0"

[tasks]
test = "pytest tests/ -v"
llm-setup = "ollama pull granite3.3"

[dependencies]
python = "3.13.*"
poppler = ">=25.7.0,<26"
ollama = ">=0.12.10,<0.13"
marimo = ">=0.17.7,<0.18"
typer = ">=0.17.0,<0.18"
rich = ">=13.7.0"
pytest = ">=8.0.0,<9"

[pypi-dependencies]
langchain = ">=1.0.0,<2"
langchain-ollama = ">=1.0.0,<2"
langchain-community = ">=0.4.1,<0.5"
langchain-text-splitters = ">=1.0.0,<2"
pymupdf = ">=1.26.6, <2"
docx2txt = ">=0.8"
fastapi = ">=0.109.0"
uvicorn = ">=0.27.0"
python-multipart = ">=0.0.9"
jinja2 = ">=3.1.3"
