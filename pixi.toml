[workspace]
authors = ["Joshua Shapiro <josh.shapiro@ccdatalab.org>"]
channels = ["conda-forge", "bioconda"]
name = "rsp-evaluator"
platforms = ["osx-arm64", "win-64", "linux-64"]
version = "0.2.0"

[tasks]
test = "pytest tests/ -v"
llm-setup = "ollama pull granite3.3"

[dependencies]
python = "3.13.*"
poppler = ">=25.0.0"
ollama = ">=0.6.0"
marimo = ">=0.13.0"
typer = ">=0.15.0"
rich = ">=13.7.0"
pytest = ">=8.0.0"

[pypi-dependencies]
langchain = ">=1.0.0,<2"
langchain-ollama = ">=1.0.0,<2"
langchain-community = ">=0.4.1"
langchain-text-splitters = "*"
pymupdf = ">=1.25.0,<2"
docx2txt = ">=0.8"
fastapi = ">=0.115.0"
uvicorn = ">=0.30.0"
python-multipart = ">=0.0.9"
jinja2 = ">=3.1.3"

[system-requirements]
macos = "14.0"

[target.osx-arm64.pypi-dependencies]
mlx-lm = ">=0.31.0"
